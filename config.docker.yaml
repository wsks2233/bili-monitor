# B站UP主动态监控系统配置文件 - Docker 环境

# 监控配置
monitor:
  check_interval: 300
  retry_times: 3
  retry_delay: 5
  cookie: ""

# UP主列表
upstreams:
  - uid: "546195"
    name: "老番茄"

# 日志配置
logger:
  level: INFO
  file: logs/bili-monitor.log
  max_bytes: 10485760
  backup_count: 5

# 数据库配置 - Docker MySQL
database:
  type: mysql
  host: mysql              # Docker Compose 服务名
  port: 3306
  user: root
  password: bili_monitor_2024
  database: bili_monitor
