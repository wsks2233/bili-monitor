# B站UP主动态监控系统配置文件

# 监控配置
monitor:
  check_interval: 300
  retry_times: 3
  retry_delay: 5
  cookie: ""

# UP主列表
upstreams:
  - uid: "546195"
    name: "老番茄"

# 日志配置
logger:
  level: INFO
  file: logs/bili-monitor.log
  max_bytes: 10485760
  backup_count: 5

# 数据库配置
database:
  type: sqlite
  path: data/bili_monitor.db

